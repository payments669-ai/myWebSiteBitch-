<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vodafone Cash - بوابة شحن فودافون كاش</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #121212;
      --bg-gradient-1: rgba(230, 0, 0, 0.05);
      --bg-gradient-2: rgba(230, 0, 0, 0.03);
      --card-bg: rgba(22, 18, 20, 0.88);
      --card-border: rgba(230, 0, 0, 0.15);
      --card-shadow: rgba(0, 0, 0, 0.4);
      --accent: #E60000;
      --accent-hover: #cc0000;
      --accent-glow: rgba(230, 0, 0, 0.2);
      --input-bg: #2b292a;
      --input-border: #3f3537;
      --input-focus-bg: #332a2b;
      --text-primary: #ffffff;
      --text-secondary: #b0a5a7;
      --text-muted: #7a6e70;
      --btn-text: #ffffff;
      --radius: 20px;
      --radius-sm: 12px;
      --font-ar: 'Cairo', sans-serif;
      --font-en: 'Inter', sans-serif;
      --topbar-border: rgba(230, 0, 0, 0.15);
      --topbar-bg: rgba(230, 0, 0, 0.08);
      --topbar-hover-bg: rgba(230, 0, 0, 0.18);
      --dot-color: rgba(255, 255, 255, 0.5);
      --line-color: rgba(255, 255, 255, 0.12);
    }

    .light {
      --bg: #f5f0ef;
      --bg-gradient-1: rgba(230, 0, 0, 0.07);
      --bg-gradient-2: rgba(230, 0, 0, 0.03);
      --card-bg: rgba(255, 255, 255, 0.78);
      --card-border: rgba(230, 0, 0, 0.3);
      --card-shadow: rgba(0, 0, 0, 0.1);
      --input-bg: #ffffff;
      --input-border: #d4c5c3;
      --input-focus-bg: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #6a4f4d;
      --text-muted: #9a7f7d;
      --btn-text: #ffffff;
      --topbar-border: rgba(230, 0, 0, 0.35);
      --topbar-bg: rgba(230, 0, 0, 0.1);
      --topbar-hover-bg: rgba(230, 0, 0, 0.2);
      --dot-color: rgba(128, 128, 128, 0.5);
      --line-color: rgba(128, 128, 128, 0.15);
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font-ar);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 50%, var(--bg-gradient-1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, var(--bg-gradient-2) 0%, transparent 50%);
      transition: background 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 40px 28px 32px;
      box-shadow:
        0 8px 32px var(--card-shadow),
        inset 0 1px 0 rgba(230, 0, 0, 0.06);
      transition: box-shadow 0.3s ease, background 0.4s ease;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .card:hover {
      box-shadow:
        0 12px 48px var(--card-shadow),
        0 0 40px rgba(230, 0, 0, 0.04),
        inset 0 1px 0 rgba(230, 0, 0, 0.08);
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 8px;
      direction: ltr !important;
    }

    .top-bar .group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-btn {
      font-family: var(--font-ar);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 50px;
      border: 1px solid var(--topbar-border);
      background: var(--topbar-bg);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .theme-btn, .lang-btn {
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .top-btn:hover {
      background: var(--topbar-hover-bg);
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(230, 0, 0, 0.1);
    }

    .top-btn .icon {
      font-size: 1rem;
      line-height: 1;
    }

    .theme-btn .icon {
      display: inline-block;
      transition: transform 0.3s ease;
    }

    .theme-btn:hover .icon {
      transform: rotate(20deg);
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--topbar-bg);
      border: 1px solid var(--topbar-border);
      border-radius: 50px;
      padding: 8px 18px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin: 0 auto 28px;
      width: fit-content;
      backdrop-filter: blur(10px);
      direction: ltr;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #badgeNumber {
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: all 0.2s ease;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #badgeNumber.highlight {
      color: #ffffff !important;
      background-color: var(--accent) !important;
      box-shadow: 0 0 10px rgba(230, 0, 0, 0.6);
    }
    .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      padding-right: 4px;
      transition: color 0.3s ease;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      font-family: var(--font-ar);
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text-primary);
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: all 0.3s ease;
      direction: rtl;
    }

    .form-group input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
      opacity: 0.7;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow), 0 0 20px rgba(230, 0, 0, 0.06);
      background: var(--input-focus-bg);
    }

    .form-group input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px var(--input-bg) inset;
      -webkit-text-fill-color: var(--text-primary);
      border-color: var(--input-border);
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      margin-top: 8px;
      font-family: var(--font-ar);
      font-size: 1rem;
      font-weight: 700;
      color: var(--btn-text);
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .submit-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(230, 0, 0, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(230, 0, 0, 0.2);
    }

    .msg-box {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      z-index: 9999;
      padding: 14px 24px;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      max-width: 440px;
      width: calc(100% - 40px);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    .msg-box.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .msg-box.success {
      background: rgba(0, 200, 83, 0.18);
      border: 1px solid rgba(0, 200, 83, 0.3);
      color: #4ade80;
    }

    .msg-box.error {
      background: rgba(230, 0, 0, 0.18);
      border: 1px solid rgba(230, 0, 0, 0.3);
      color: #ff6b6b;
    }

    .msg-box.info {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text-secondary);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }

    .input-shake {
      animation: shake 0.5s ease;
      border-color: #ff4444 !important;
      box-shadow: 0 0 0 3px rgba(255, 68, 68, 0.25) !important;
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .footer-text {
      text-align: center;
      margin-top: 22px;
      font-size: 0.72rem;
      color: var(--text-muted);
      opacity: 0.6;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .card.ltr { direction: ltr; }
    .card.ltr .form-group input { direction: ltr; }

    @media (max-width: 480px) {
      body { padding: 12px; }
      .card { padding: 28px 18px 24px; border-radius: 16px; }
      .header h1 { font-size: 1.35rem; }
      .badge { font-size: 0.7rem; padding: 6px 14px; }
      .submit-btn { padding: 14px; font-size: 0.92rem; }
      .top-btn { padding: 6px 12px; font-size: 0.75rem; }
    }

    @media (min-width: 768px) {
      .card { padding: 48px 36px 36px; }
    }
  </style>
</head>
<body>

  <canvas id="particles-canvas"></canvas>

  <div class="card" id="appCard">
    <div class="top-bar">
      <div class="group">
        <button class="top-btn lang-btn" id="langToggle">EN</button>
      </div>
      <div class="group">
        <button class="top-btn theme-btn" id="themeToggle">
          <span class="icon" id="themeIcon">&#9790;</span>
        </button>
      </div>
    </div>

    <div class="header">
      <h1 id="title">فودافون كاش</h1>
      <p id="subtitle">بوابة الشحن</p>
    </div>

    <div class="badge" id="badgeCopy">
      <span class="dot"></span>
      <span id="badgeText">رقم فودافون كاش: <span id="badgeNumber" title="اضغط للنسخ">01003095673</span></span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.8; flex-shrink: 0;">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
    </div>

    <form id="paymentForm">
      <div class="form-group">
        <label id="labelOrder">رقم المحول منه</label>
        <input type="text" id="inputOrder" placeholder="مثلاً: 01041122334" inputmode="numeric" autocomplete="off">
      </div>
      <div class="form-group">
        <label id="labelAmount">المبلغ بالجنيه</label>
        <input type="text" id="inputAmount" placeholder="مثلاً: 50" inputmode="decimal" autocomplete="off">
      </div>
      <input type="hidden" id="inputUserId">
      <div id="userIdIndicator" style="display:none;text-align:center;margin-top:4px;font-size:0.72rem;color:var(--text-muted);opacity:0.5;direction:ltr"></div>
      <button class="submit-btn" id="submitBtn" type="submit">التحقق من الدفع</button>
    </form>
    <div class="msg-box" id="msgBox"></div>

    <div class="footer-text">Vodafone Cash &mdash; Recharge Portal</div>
  </div>

  <script>
    const CHECK_ENDPOINT = '/api/check_payment';

    const form        = document.getElementById('paymentForm');
    const amountInp   = document.getElementById('inputAmount');
    const phoneInp    = document.getElementById('inputOrder');
    const userIdInp   = document.getElementById('inputUserId');
    const submitBtn   = document.getElementById('submitBtn');
    const msgBox      = document.getElementById('msgBox');
    const badgeCopy   = document.getElementById('badgeCopy');
    const badgeNumber = document.getElementById('badgeNumber');

    const themeToggle = document.getElementById('themeToggle');
    const themeIcon   = document.getElementById('themeIcon');
    const langToggle  = document.getElementById('langToggle');
    const htmlEl      = document.documentElement;
    let isDark = true;
    let isAr    = true;

    const langData = {
      title:       { ar: 'فودافون كاش',            en: 'Vodafone Cash' },
      subtitle:    { ar: 'بوابة الشحن',             en: 'Recharge Portal' },
      badgeText:   { ar: 'رقم فودافون كاش: 01003095673', en: 'Vodafone Cash: 01003095673' },
      labelOrder:  { ar: 'رقم المحول منه',          en: 'Sender Phone' },
      orderPlh:    { ar: 'مثلاً: 01041122334',      en: 'e.g., 01041122334' },
      labelAmount: { ar: 'المبلغ بالجنيه',           en: 'Amount (EGP)' },
      amountPlh:   { ar: 'مثلاً: 50',              en: 'e.g., 50' },
      submitBtn:   { ar: 'التحقق من الدفع',         en: 'Verify Payment' },
      footer:      { ar: 'Vodafone Cash — بوابة الشحن', en: 'Vodafone Cash — Recharge Portal' },
      langBtnAr:   { ar: 'EN',                      en: 'العربي' },
      loading:     { ar: 'جاري التحقق...',            en: 'Verifying...' },
      errEmptyBoth: { ar: 'يرجى ملء الحقول أولاً.',
                      en: 'Please fill in all fields first' },
      errEmptyPhone: { ar: 'يرجى ملء حقل الرقم الذي تم التحويل منه',
                       en: 'Please fill in the phone field' },
      errEmptyAmount: { ar: 'يرجى ملء حقل المبلغ الذي قمت بتحويله',
                        en: 'Please fill in the amount field' },
      errPhone:    { ar: 'رقم الهاتف غير صحيح - يجب أن يكون 11 رقماً يبدأ بـ 010, 011, 012, أو 015',
                     en: 'Invalid phone - must be 11 digits starting with 010, 011, 012, or 015' },
      errAmount:   { ar: 'المبلغ غير صحيح - يرجى إدخال رقم صحيح',
                     en: 'Invalid amount - please enter a valid number' },
      errMin:      { ar: 'المبلغ يجب أن يكون 50 جنيهاً على الأقل',
                     en: 'Amount must be at least 50 EGP' },
      successMsg:  { ar: 'تم العثور على الدفعة!',    en: 'Payment found!' },
      notFoundMsg: { ar: 'لم يتم العثور على دفعة - حاول مرة أخرى لاحقاً.',
                     en: 'No matching payment found - try again later.' },
      failMsg:     { ar: 'فشل التحقق من الدفع - حاول مرة أخرى لاحقاً.',
                     en: 'Verification failed - try again later.' },
      closingMsg:  { ar: 'تم تأكيد الدفعة! سيتم إغلاق الصفحة...',
                     en: 'Payment confirmed! Closing page...' },
    };

    function applyLang(ar) {
      const l = ar ? 'ar' : 'en';
      htmlEl.lang = l;
      htmlEl.dir  = ar ? 'rtl' : 'ltr';

      document.getElementById('title').textContent       = langData.title[l];
      document.getElementById('subtitle').textContent    = langData.subtitle[l];
      const badgeTextEl = document.getElementById('badgeText');
      if (badgeTextEl) badgeTextEl.childNodes[0].nodeValue = ar ? 'رقم فودافون كاش: ' : 'Vodafone Cash: ';
      document.getElementById('labelOrder').textContent  = langData.labelOrder[l];
      document.getElementById('inputOrder').placeholder  = langData.orderPlh[l];
      document.getElementById('labelAmount').textContent = langData.labelAmount[l];
      document.getElementById('inputAmount').placeholder = langData.amountPlh[l];
      if (!submitBtn.disabled) submitBtn.textContent = langData.submitBtn[l];
      document.querySelector('.footer-text').textContent = langData.footer[l];

      langToggle.innerHTML = `<span class="lang-ar">${langData.langBtnAr[l]}</span>`;
    }

    langToggle.addEventListener('click', () => {
      isAr = !isAr;
      applyLang(isAr);
    });

    applyLang(true);

    const urlParams = new URLSearchParams(window.location.search);
    const urlUserId = urlParams.get('id') || urlParams.get('user_id');
    if (urlUserId) {
      userIdInp.value = urlUserId;
      document.getElementById('userIdIndicator').textContent = 'Telegram ID: ' + urlUserId;
      document.getElementById('userIdIndicator').style.display = 'block';
    }

    themeToggle.addEventListener('click', () => {
      isDark = !isDark;
      htmlEl.classList.toggle('light', !isDark);
      themeIcon.textContent = isDark ? '\u263E' : '\u2600';
      updateParticleColors();
    });

    function copyNumber(el) {
      const number = '01003095673';
      try {
        navigator.clipboard.writeText(number);
      } catch {
        try {
          const ta = document.createElement('textarea');
          ta.value = number;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        } catch {}
      }
      if (window.getSelection) window.getSelection().removeAllRanges();
      if (el) {
        el.style.setProperty('color', '#E60000', 'important');
        setTimeout(() => el.style.removeProperty('color'), 2000);
      }
    }

    if (badgeCopy) {
      badgeCopy.addEventListener('click', function(e) {
        e.preventDefault();
        copyNumber(badgeNumber);
      });
    }
    if (badgeNumber) {
      badgeNumber.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        copyNumber(this);
      });
    }

    let msgTimer = null;

    function showMsg(text, type) {
      if (msgTimer) clearTimeout(msgTimer);
      msgBox.textContent = text;
      msgBox.className = 'msg-box ' + type + ' visible';
      if (type === 'error') {
        msgTimer = setTimeout(() => {
          msgBox.classList.remove('visible');
        }, 3500);
      }
    }

    function clearMsg() {
      if (msgTimer) clearTimeout(msgTimer);
      msgBox.className = 'msg-box';
      msgBox.textContent = '';
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      const l = isAr ? 'ar' : 'en';
      submitBtn.textContent = loading ? langData.loading[l] : langData.submitBtn[l];
    }

    function validate(phone, amount) {
      const l = isAr ? 'ar' : 'en';
      const PHONE_RE = /^(010|011|012|015)\d{8}$/;
      if (!PHONE_RE.test(phone)) return langData.errPhone[l];
      const amt = parseFloat(amount);
      if (isNaN(amt) || amt <= 0) return langData.errAmount[l];
      if (amt < 50) return langData.errMin[l];
      return null;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMsg();

      const phone  = phoneInp.value.trim();
      const amount = amountInp.value.trim();
      const uid    = userIdInp.value.trim();

      [phoneInp, amountInp].forEach(el => el.classList.remove('input-shake'));

      const l = isAr ? 'ar' : 'en';

      if (!phone && !amount) {
        showMsg(langData.errEmptyBoth[l], 'error');
        let target = phoneInp;
        target.classList.add('input-shake');
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.focus();
        setTimeout(() => target.classList.remove('input-shake'), 600);
        return;
      }

      if (!phone) {
        showMsg(langData.errEmptyPhone[l], 'error');
        let target = phoneInp;
        target.classList.add('input-shake');
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.focus();
        setTimeout(() => target.classList.remove('input-shake'), 600);
        return;
      }

      if (!amount) {
        showMsg(langData.errEmptyAmount[l], 'error');
        let target = amountInp;
        target.classList.add('input-shake');
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.focus();
        setTimeout(() => target.classList.remove('input-shake'), 600);
        return;
      }

      const error = validate(phone, amount);
      if (error) {
        showMsg(error, 'error');
        let target = (!amount || isNaN(parseFloat(amount)) || parseFloat(amount) < 50) ? amountInp : phoneInp;
        target.classList.add('input-shake');
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.focus();
        setTimeout(() => target.classList.remove('input-shake'), 600);
        return;
      }

      const body = {
        sender_phone: phone,
        amount:       parseFloat(amount),
      };
      if (uid) body.user_id = parseInt(uid, 10);

      setLoading(true);
      try {
        const res = await fetch(CHECK_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (res.ok && data.status === 'success') {
          showMsg(langData.successMsg[l], 'success');
          confetti({
            particleCount: 150,
            spread: 100,
            origin: { y: 0.6 },
            colors: ['#E60000', '#ffffff', '#FFD700']
          });
          setTimeout(() => {
            confetti({
              particleCount: 100,
              angle: 60,
              spread: 80,
              origin: { x: 0, y: 0.5 },
              colors: ['#E60000', '#ffffff', '#FFD700']
            });
            confetti({
              particleCount: 100,
              angle: 120,
              spread: 80,
              origin: { x: 1, y: 0.5 },
              colors: ['#E60000', '#ffffff', '#FFD700']
            });
          }, 1000);
          setTimeout(() => window.close(), 2000);
        } else {
          const l = isAr ? 'ar' : 'en';
          showMsg(langData.notFoundMsg[l], 'error');
        }
      } catch (err) {
        const l = isAr ? 'ar' : 'en';
        showMsg(langData.failMsg[l], 'error');
      } finally {
        setLoading(false);
      }
    });

    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animId = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function getDotColor() {
      const style = getComputedStyle(document.documentElement);
      return style.getPropertyValue('--dot-color').trim();
    }

    function getLineColor() {
      const style = getComputedStyle(document.documentElement);
      return style.getPropertyValue('--line-color').trim();
    }

    function updateParticleColors() {
      const dotColor = getDotColor();
      const lineColor = getLineColor();
      particles.forEach(p => {
        p.color = dotColor;
      });
    }

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = Math.random() * 2 + 1.5;
        this.color = getDotColor();
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    const particleCount = 60;
    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
      }

      const lineColor = getLineColor();
      const connectionDistance = 120;

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < connectionDistance) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = Math.max(0.3, (1 - dist / connectionDistance) * 0.8);
            ctx.stroke();
          }
        }
      }

      animId = requestAnimationFrame(animateParticles);
    }

    animateParticles();
  </script>

</body>
</html>
